<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - PGI Job Portal</title>

<style>

:root{
--evergreen:#286A34;
--evergreen-dark:#1f5428;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#050b14;
color:white;
}

.container{
width:380px;
padding:40px 30px;
border-radius:20px;
backdrop-filter:blur(16px);
background:rgba(10,15,30,0.65);
border:1px solid rgba(74,222,128,0.2);
text-align:center;
box-shadow:0 25px 50px -12px rgba(0,0,0,0.8);
}

h2{
margin-bottom:20px;
font-weight:600;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(0,0,0,0.4);
color:white;
outline:none;
}

input:focus{
border-color:var(--evergreen);
background:rgba(0,0,0,0.6);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--evergreen);
font-weight:bold;
cursor:pointer;
transition:0.3s;
color:black;
}

button:hover{
background:black;
color:var(--evergreen);
}

.success{
margin-top:15px;
color:#4ade80;
}

.error{
margin-top:15px;
color:#ef4444;
}

</style>

</head>

<body>

<div class="container">

<h2>Reset Password</h2>

<input type="password" id="newPassword" placeholder="Enter New Password">

<button onclick="resetPassword()">Update Password</button>

<div id="message"></div>

</div>


<script>

const token = "{{ token }}";

async function resetPassword(){

const password = document.getElementById("newPassword").value;

if(!password){
alert("Enter a new password");
return;
}

try{

const response = await fetch("/api/reset_password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
token:token,
password:password
})

});

const data = await response.json();

const msg=document.getElementById("message");

if(data.status==="success"){

msg.innerHTML="<div class='success'>Password updated successfully. Redirecting to login...</div>";

setTimeout(()=>{
window.location.href="/";
},2000);

}else{

msg.innerHTML="<div class='error'>Reset link expired or invalid.</div>";

}

}catch(err){

console.error(err);
alert("Server error");

}

}

</script>

</body>
</html>
